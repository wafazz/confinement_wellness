<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline — Confinement & Wellness</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #faf6f2;
            color: #3d2c1e;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
        }
        .offline-container { max-width: 400px; }
        .offline-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 1.5rem;
            background: linear-gradient(135deg, #c8956c, #b07d58);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .offline-icon svg { width: 40px; height: 40px; fill: #fff; }
        h1 { font-size: 1.5rem; margin-bottom: 0.5rem; color: #3d2c1e; }
        p { color: #8b6f5e; margin-bottom: 1.5rem; line-height: 1.6; }
        .retry-btn {
            display: inline-block;
            padding: 0.7rem 2rem;
            background: linear-gradient(135deg, #c8956c, #b07d58);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .retry-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(200,149,108,0.4);
        }
        .brand {
            margin-top: 2rem;
            font-size: 0.8rem;
            color: #b09a8a;
        }
    </style>
</head>
<body>
    <div class="offline-container">
        <div class="offline-icon">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10c1.85 0 3.58-.5 5.07-1.37l-1.49-1.49A7.96 7.96 0 0112 20c-4.41 0-8-3.59-8-8 0-1.2.27-2.34.74-3.36L12 15.9V22h.5c5.25-.5 9.5-5 9.5-10 0-.87-.11-1.71-.32-2.52l-1.54 1.54c.06.32.09.65.09.98 0 3.07-1.64 5.64-4 7.07V16l-7.26-7.26L3.71 2.29 2.29 3.71l4.37 4.37C5.02 9.86 4 11.82 4 14c0 4.42 3.58 8 8 8 2.18 0 4.14-1.02 5.92-2.66l4.37 4.37 1.42-1.42L12 10.59 5.41 4 12 2z"/>
            </svg>
        </div>
        <h1>You're Offline</h1>
        <p>It looks like you've lost your internet connection. Please check your network and try again.</p>
        <button class="retry-btn" onclick="window.location.reload()">Try Again</button>
        <div class="brand">Confinement & Wellness</div>
    </div>
</body>
</html>
